apiVersion: v1
kind: Secret
metadata:
  name: eversports-backend-secrets
type: Opaque
stringData:
  database_url: "postgresql://user:pass@host:5432/eversports"
  encryption_key: "<AES-256-GCM key — generate with: python -c 'import os; print(os.urandom(32).hex())'>"
  jwt_secret: "<random string>"
  FRONTEND_URL: "https://your-frontend-domain"
  resend_api_key: "<Resend API key from resend.com/api-keys>"
  from_email: "bookings@yourdomain.com"
  vapid_private_key: "<VAPID private key — generate with: python -m py_vapid --gen>"
  vapid_public_key: "<VAPID public key — generate with: python -m py_vapid --gen>"
  vapid_subject: "mailto:admin@yourdomain.com"
