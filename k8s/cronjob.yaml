# Booking 1: Tuesday 18:00 — script runs Friday 18:00 Berlin (today+4=Tuesday)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: eversports-booking-tuesday-1800
spec:
  schedule: "0 18 * * 5"
  timeZone: "Europe/Berlin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          imagePullSecrets:
            - name: ghcr-secret
          restartPolicy: Never
          containers:
            - name: booking
              image: ghcr.io/gerrited/automate-eversports-bookings:latest
              env:
                - name: EVERSPORTS_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: eversports-credentials
                      key: email
                - name: EVERSPORTS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: eversports-credentials
                      key: password
                - name: TARGET_TIME
                  value: "18:00"
                - name: FACILITY_ID
                  value: "73041"
---
