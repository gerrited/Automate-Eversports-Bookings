apiVersion: batch/v1
kind: CronJob
metadata:
  name: eversports-worker
spec:
  schedule: "*/15 * * * *"
  timeZone: "Europe/Berlin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          imagePullSecrets:
            - name: ghcr-secret
          restartPolicy: Never
          containers:
            - name: worker
              image: ghcr.io/gerrited/automate-eversports-bookings-worker:latest
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: eversports-backend-secrets
                      key: database_url
                - name: ENCRYPTION_KEY
                  valueFrom:
                    secretKeyRef:
                      name: eversports-backend-secrets
                      key: encryption_key
                - name: RESEND_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: eversports-backend-secrets
                      key: resend_api_key
                - name: FROM_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: eversports-backend-secrets
                      key: from_email
                - name: FRONTEND_URL
                  valueFrom:
                    secretKeyRef:
                      name: eversports-backend-secrets
                      key: FRONTEND_URL
                - name: VAPID_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: eversports-backend-secrets
                      key: vapid_private_key
                - name: VAPID_PUBLIC_KEY
                  valueFrom:
                    secretKeyRef:
                      name: eversports-backend-secrets
                      key: vapid_public_key
                - name: VAPID_SUBJECT
                  valueFrom:
                    secretKeyRef:
                      name: eversports-backend-secrets
                      key: vapid_subject
