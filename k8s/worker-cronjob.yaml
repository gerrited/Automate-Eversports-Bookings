apiVersion: batch/v1
kind: CronJob
metadata:
  name: eversports-worker
spec:
  schedule: "0 * * * *"
  timeZone: "Europe/Berlin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          imagePullSecrets:
            - name: ghcr-secret
          restartPolicy: Never
          containers:
            - name: worker
              image: ghcr.io/gerrited/automate-eversports-bookings-worker:latest
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: eversports-backend-secrets
                      key: database_url
                - name: ENCRYPTION_KEY
                  valueFrom:
                    secretKeyRef:
                      name: eversports-backend-secrets
                      key: encryption_key
